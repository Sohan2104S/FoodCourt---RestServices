# Razorpay Test Mode (https://dashboard.razorpay.com/app/keys)
# Leave empty to use demo payment (no real gateway).
razorpay.enabled=false
razorpay.key-id=
razorpay.key-secret=

# Currency for Razorpay orders (INR recommended for India test account)
razorpay.currency=INR

# Load local secrets if file exists (copy from application-local.properties.example)
spring.config.import=optional:classpath:application-local.properties

# H2 Database settings
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.h2.console.enabled=true
